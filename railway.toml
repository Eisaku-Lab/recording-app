[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mysqlnd", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.bcmath", "nodejs"]

[build]
buildCommand = "composer install --no-dev && php artisan config:clear"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
